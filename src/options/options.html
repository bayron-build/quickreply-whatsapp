<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>QuickReply</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main>
      <h1 data-i18n="optionsTitle"></h1>
      <p id="count" class="muted"></p>
      <p id="notif-warning" class="muted" hidden data-i18n="notifDisabledWarning"></p>

      <ul id="list"></ul>
      <p id="empty" class="muted" data-i18n="noTemplatesYet" hidden></p>
      <button id="delete-selected" class="danger" hidden></button>

      <button id="add" class="primary" data-i18n="addTemplate"></button>

      <section id="editor" hidden>
        <label><span data-i18n="fieldTitle"></span><input id="f-title" maxlength="60" /></label>
        <label><span data-i18n="fieldShortcut"></span><input id="f-shortcut" maxlength="20" /></label>
        <label><span data-i18n="fieldBody"></span><textarea id="f-body" rows="5"></textarea></label>
        <p class="muted" data-i18n="placeholderHint"></p>
        <div class="row">
          <button id="save" class="primary" data-i18n="save"></button>
          <button id="cancel" data-i18n="cancel"></button>
        </div>
      </section>

      <hr />
      <section id="pro">
        <h2 data-i18n="proTitle"></h2>
        <p class="muted" data-i18n="proPitch"></p>
        <p id="pro-status"></p>
        <a id="upgrade" class="button-link" target="_blank" rel="noopener" hidden></a>
        <div id="license-entry">
          <label><span data-i18n="licenseLabel"></span><input id="f-license" autocomplete="off" /></label>
          <button id="activate" class="primary" data-i18n="activate"></button>
        </div>
        <button id="deactivate" data-i18n="deactivate" hidden></button>
        <p id="license-error" class="error" role="alert"></p>
      </section>

      <hr />
      <div class="row">
        <button id="export" data-i18n="export"></button>
        <button id="import" data-i18n="import"></button>
        <input type="file" id="import-file" accept=".json,application/json" hidden />
      </div>
      <p id="status" class="muted" role="status"></p>
    </main>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
